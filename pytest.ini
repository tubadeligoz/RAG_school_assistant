[pytest]
testpaths = tests
addopts = -ra
markers =
    alpha: early smoke and readiness checks
    unit: isolated function-level tests
    integration: multi-module tests with mocked external services
    system: optional live app/process checks
    performance: lightweight latency and throughput checks
    rag_quality: retrieval and grounding quality checks
    ai_quality: answer quality and hallucination guard checks
    beta: user-acceptance style beta scenarios
    security: prompt-injection and data-boundary checks
    slow: tests that may load models, Chroma, or call live services
